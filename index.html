<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>歡迎來到我的網站</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f8f9fa;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        max-width: 450px;
        width: 90%;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 15px;
        color: #111;
      }
      p {
        font-size: 16px;
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      .btn {
        display: inline-block;
        text-decoration: none;
        background-color: #007bff;
        color: white;
        padding: 12px 28px;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        border: 1px solid #007bff;
        transition:
          background-color 0.2s,
          border-color 0.2s;
      }
      .btn:hover {
        background-color: #0056b3;
        border-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>歡迎來到我的主頁</h1>
      <p>
        這裡是我存放專案與測試網頁的地方。<br />點擊下方按鈕前往「360網頁」：
      </p>

      <a href="360index.html" class="btn">前往360網頁</a>
    </div>
  </body>
</html>
